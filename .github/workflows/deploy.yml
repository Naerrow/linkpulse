# main 푸시 시 ECR 빌드·푸시 → ECS 롤링 배포. workflow_dispatch로 수동/롤백도 가능.
# 인증은 OIDC(장기 키 없음). 배포는 aws CLI만 — terraform apply는 하지 않는다(docs/adr/0001).
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "롤백할 기존 ECR 이미지 태그(git sha). 비우면 현재 커밋 sha로 새로 빌드·배포."
        required: false
        type: string

permissions:
  id-token: write # OIDC 토큰 발급
  contents: read

# 프로덕션 배포를 직렬화(동시 배포 방지). 진행 중 배포는 끊지 않는다.
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2

jobs:
  # 배포 파라미터 결정: 신규(현재 sha 빌드) vs 롤백(기존 태그 재배포).
  setup:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      build_image: ${{ steps.vars.outputs.build_image }}
    steps:
      - id: vars
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_TAG" ]; then
            # 수동 입력값은 셸에서 쓰이므로 Docker 태그 패턴으로 검증한다.
            if ! printf '%s' "$INPUT_TAG" | grep -Eq '^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$'; then
              echo "잘못된 image_tag: $INPUT_TAG"; exit 1
            fi
            echo "image_tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
            echo "build_image=false" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=$SHA" >> "$GITHUB_OUTPUT"
            echo "build_image=true" >> "$GITHUB_OUTPUT"
          fi

  # 코드 검증. 롤백(기존 이미지 재배포)일 땐 새 코드가 없으므로 건너뛴다.
  checks:
    needs: setup
    if: needs.setup.outputs.build_image == 'true'
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: [setup, checks]
    # checks가 (롤백으로) skip돼도 배포는 진행. 단 main ref에서만(OIDC trust가 main 한정이라
    # 다른 ref의 workflow_dispatch는 assume 자체가 실패하므로 미리 차단).
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.setup.result == 'success' &&
      (needs.setup.outputs.build_image == 'false' || needs.checks.result == 'success')
    runs-on: ubuntu-latest # x86 GA 러너(신뢰성·용량↑). arm64 이미지는 buildx로 크로스컴파일한다(ADR 0001).
    env:
      IMAGE_TAG: ${{ needs.setup.outputs.image_tag }}
      BUILD_IMAGE: ${{ needs.setup.outputs.build_image }}
      ECR_URL: ${{ vars.ECR_REPOSITORY_URL }}
      ECR_NAME: ${{ vars.ECR_REPOSITORY_NAME }}
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      # arm64 크로스빌드용 buildx 빌더(docker-container 드라이버). x86 러너에서 --platform 빌드를 가능케 한다.
      - uses: docker/setup-buildx-action@v3

      # preflight: 태그가 ECR에 이미 있으면 빌드 skip(멱등, 같은 sha 재실행 시 재사용).
      # 롤백인데 태그가 없으면 실패시킨다(lifecycle 보관 범위 밖으로 만료됐을 수 있음).
      - id: preflight
        run: |
          set -euo pipefail
          if aws ecr describe-images --repository-name "$ECR_NAME" --image-ids imageTag="$IMAGE_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            if [ "$BUILD_IMAGE" = "false" ]; then
              echo "롤백 대상 태그 '$IMAGE_TAG'가 ECR에 없습니다(lifecycle 보관 30개 초과로 만료됐을 수 있음)."
              exit 1
            fi
          fi

      # 신규 배포이고 아직 없을 때만 빌드·푸시. x86 러너에서 arm64로 크로스컴파일(buildx가 빌드+푸시 동시).
      - name: 빌드 & 푸시 (arm64 크로스컴파일)
        if: env.BUILD_IMAGE == 'true' && steps.preflight.outputs.exists == 'false'
        run: |
          set -euo pipefail
          docker buildx build --platform linux/arm64 -t "$ECR_URL:$IMAGE_TAG" --push app

      # family의 최신 active task def를 base로 받아 register 입력에 맞게 불변 필드를 제거한다.
      - name: task definition 받기
        run: |
          set -euo pipefail
          aws ecs describe-task-definition \
            --task-definition "${{ vars.ECS_TASK_DEFINITION_FAMILY }}" \
            --query taskDefinition > taskdef-full.json
          jq 'del(.status, .revision, .taskDefinitionArn, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)' \
            taskdef-full.json > taskdef.json

      - id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: taskdef.json
          container-name: app
          image: ${{ env.ECR_URL }}:${{ env.IMAGE_TAG }}

      - uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          cluster: ${{ vars.ECS_CLUSTER_NAME }}
          service: ${{ vars.ECS_SERVICE_NAME }}
          wait-for-service-stability: true
