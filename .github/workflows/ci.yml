# PR 검증 + deploy.yml이 재사용(workflow_call)하는 Go/Docker 체크.
# push 트리거는 두지 않는다 — main push는 deploy.yml이 이 워크플로를 호출하므로 중복 실행을 막는다.
name: ci

on:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  go-checks:
    name: Go vet / test / fmt
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app # Makefile과 go 모듈이 app/ 아래(모노레포)
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: app/go.mod # go.mod의 go 지시문과 자동 동기(버전 드리프트 방지)
          cache-dependency-path: app/go.sum # 캐시 키는 repo 루트 기준 경로

      - name: gofmt 검사
        run: test -z "$(gofmt -l .)" || { echo "gofmt 필요:"; gofmt -l .; exit 1; }

      - name: go vet
        run: make vet

      - name: 단위 테스트
        run: make test

      # Dockerfile smoke test: PR에서 배포와 동일한 arm64 크로스빌드가 x86에서 성공하는지 확인한다.
      # deploy.yml이 x86 GA 러너 + buildx로 arm64를 크로스컴파일하므로(ADR 0001), 그 경로를 여기서
      # 미리 검증해 조용한 회귀를 막는다. --push/--load 없이 빌드만 해 성공 여부만 본다.
      # working-directory가 app이라 build context는 현재 디렉터리(.)이다.
      - name: buildx 준비
        if: github.event_name == 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Docker arm64 크로스빌드 검증
        if: github.event_name == 'pull_request'
        run: docker buildx build --platform linux/arm64 -t linkpulse-app:ci .
